model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "none"
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"
web_search = "live"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"
allow_login_shell = true
shell_environment_policy.inherit = "all"
background_terminal_max_timeout = 1800000
agent.max_turns = 2000
agent.max_retries = 100
agents.max_threads = 256
agents.max_depth = 128
agents.job_max_runtime_seconds = 604800
tool_output_token_limit = 1000000
history.persistence = "save-all"
history.max_bytes = 209715200
project_doc_max_bytes = 4194304
suppress_unstable_features_warning = true
check_for_update_on_startup = false

[projects."~/box"]
trust_level = "trusted"
auto_update = true

[projects."/Users/konstantinbaltsat"]
trust_level = "trusted"

[projects."/Users/konstantinbaltsat/box"]
trust_level = "trusted"

[projects."/private/tmp"]
trust_level = "trusted"

[projects."/home/konstantinbaltsat/agent"]
trust_level = "trusted"

[projects."/home/konstantinbaltsat"]
trust_level = "trusted"

[mcp_servers.delegate]
command = "bash"
args = ["-c", "exec bun run ~/box/tools/delegate-mcp/server.ts"]
tool_timeout_sec = 1800

[mcp_servers.codex_apps]
url = "https://chatgpt.com/backend-api/wham/apps"
startup_timeout_sec = 300
tool_timeout_sec = 7200

[apps._default]
enabled = true
destructive_enabled = true
open_world_enabled = true
default_tools_enabled = true
default_tools_approval_mode = "approve"

[features]
approve_all = true
plan_tool = true
unified_exec = true
streamable_shell = true
shell_snapshot = true
sqlite = true
memories = true
apps = true
steer = true
personality = true
multi_agent = true

[agents.default]
description = "Primary orchestrator for planning, delegation, implementation, and verification."
config_file = "agents/default.toml"

[agents.explorer]
description = "Read-only codebase explorer for fast evidence gathering."
config_file = "agents/explorer.toml"

[agents.worker]
description = "Execution agent for implementing and validating concrete changes."
config_file = "agents/worker.toml"

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"
